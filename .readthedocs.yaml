version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - plantuml
    - default-jre
  jobs:
    post_install:
      - pip install -r docs/requirements.txt
    build:
      html:
        - python -m sphinx -T -b html -D language=de . $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: conf.py
